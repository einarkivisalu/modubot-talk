version: '3.9'

services:
  db:
    image: postgres:15
    container_name: chatbot_db
    restart: always
    environment:
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot123
      POSTGRES_DB: chatbot_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  chatbot:
    build: .
    container_name: chatbot_app
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: chatbot_db
      DB_USER: chatbot
      DB_PASSWORD: chatbot123
    volumes:
      - .:/app
    stdin_open: true   # võimaldab input() kasutada
    tty: true          # terminal töötab normaalselt

volumes:
  pgdata:
