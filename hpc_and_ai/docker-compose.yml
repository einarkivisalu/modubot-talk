services:
  db:
    image: postgres:15
    container_name: hpc_and_ai-db-1
    restart: unless-stopped
    environment:
      POSTGRES_USER: kass
      POSTGRES_PASSWORD: kiisu
      POSTGRES_DB: ModuBot
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  searxng:
    image: ghcr.io/searxng/searxng:latest
    container_name: hpc_and_ai-searxng-1
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SEARXNG_BASE_URL: http://localhost:8080/
      SEARXNG_REDIS_URL: redis://
    # Using default searxng settings, bot detection disabled via environment

  chatbot:
    build: .
    container_name: hpc_and_ai-chatbot-1
    depends_on:
      - db
      - searxng
    environment:
      DB_HOST: db
      DB_NAME: ModuBot
      DB_USER: kass
      DB_PASSWORD: kiisu
      SEARXNG_URL: http://searxng:8080
      HF_TOKEN: ${HF_TOKEN}
      HUGGINGFACE_HUB_TOKEN: ${HF_TOKEN}
    stdin_open: true
    tty: true

volumes:
  pgdata: