services:
  db:
    image: postgres:15
    container_name: hpc_and_ai-db-1
    restart: unless-stopped
    environment:
      POSTGRES_USER: kass
      POSTGRES_PASSWORD: kiisu
      POSTGRES_DB: ModuBot
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  searxng:
    image: ghcr.io/searxng/searxng:latest
    container_name: hpc_and_ai-searxng-1
    restart: unless-stopped
    ports:
      - "8080:8080"
    # Use image defaults for settings (remove SEARXNG_SETTINGS_PATH if present)
    # Using the image default settings to avoid user settings merge errors (restart loop).
    # If custom settings are required, mount a properly formatted YAML without ':ro'.

  chatbot:
    build: .
    container_name: hpc_and_ai-chatbot-1
    depends_on:
      - db
      - searxng
    environment:
      DB_HOST: db
      DB_NAME: ModuBot
      DB_USER: kass
      DB_PASSWORD: kiisu
      SEARXNG_URL: http://searxng:8080
      HF_TOKEN: ${HF_TOKEN}
      HUGGINGFACE_HUB_TOKEN: ${HF_TOKEN}
    stdin_open: true
    tty: true

volumes:
  pgdata: